{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Ingredient | Admin Panel{% endblock %}

{% block content %}
<style>
    .admin-container {
        background: white;
        border-radius: 30px;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
    }
    
    .warning-icon {
        font-size: 64px;
        margin-bottom: 20px;
    }
    
    .btn-delete {
        background: #E74C3C;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-delete:hover {
        background: #C0392B;
    }
    
    .btn-cancel {
        background: #95A5A6;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        margin-left: 10px;
    }
</style>

<div class="admin-container">
    <div class="warning-icon">⚠️</div>
    <h2>Delete Ingredient</h2>
    <p>Are you sure you want to delete <strong>"{{ ingredient.name }}"</strong>?</p>
    <p style="color: #E74C3C; font-size: 12px;">This action cannot be undone!</p>
    
    <form method="POST" style="margin-top: 30px;">
        {% csrf_token %}
        <button type="submit" class="btn-delete">🗑️ Yes, Delete</button>
        <a href="{% url 'manage-ingredients' %}" class="btn-cancel">Cancel</a>
    </form>
</div>
{% endblock %}
