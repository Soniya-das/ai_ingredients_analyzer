{% extends 'base.html' %}

{% block content %}
<style>
    .delete-container {
        max-width: 500px;
        margin: 3rem auto;
        background: white;
        border-radius: 30px;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .delete-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
    }

    .warning-text {
        color: #e53e3e;
        font-weight: bold;
        margin: 1rem 0;
    }

    .btn-confirm {
        background: #e53e3e;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 0.5rem;
    }

    .btn-cancel {
        background: #a0aec0;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin: 0.5rem;
    }

</style>

<div class="delete-container">
    <div class="delete-icon">⚠️</div>
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>
    <p class="warning-text">This action cannot be undone!</p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-confirm">Yes, Delete</button>
        <a href="{% url 'manage-products' %}" class="btn-cancel">Cancel</a>
    </form>
</div>
{% endblock %}
