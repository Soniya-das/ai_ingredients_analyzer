{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        max-width: 500px;
        margin: 3rem auto;
        background: rgba(255, 255, 255, 0.98);
        border-radius: 30px;
        padding: 3rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .auth-title {
        font-size: 2rem;
        text-align: center;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #2d3748;
    }

    .form-group input {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 15px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-submit {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .auth-link {
        text-align: center;
        margin-top: 1.5rem;
        color: #718096;
    }

    .auth-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="auth-container">
    <h2 class="auth-title">Forgot Password?</h2>
    <p style="text-align: center; color: #718096; margin-bottom: 2rem;">Enter your email to receive OTP</p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>
        <button type="submit" class="btn-submit">Send OTP</button>
    </form>
    <div class="auth-link">
        <a href="{% url 'login' %}">Back to Login</a>
    </div>
</div>
{% endblock %}
